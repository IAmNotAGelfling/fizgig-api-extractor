name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with pytest
      run: |
        pytest --cov=api_extractor --cov-report=term-missing --cov-report=html -v

    - name: Upload coverage HTML report
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30

  coverage-comment:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Generate coverage report
      run: |
        pytest --cov=api_extractor --cov-report=term -v > coverage_output.txt 2>&1 || true

    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\K\d+' coverage_output.txt || echo "0")
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        cat coverage_output.txt

    - name: Comment PR with coverage
      uses: actions/github-script@v7
      with:
        script: |
          const coverage = '${{ steps.coverage.outputs.percentage }}';
          const emoji = coverage >= 80 ? '✅' : coverage >= 60 ? '⚠️' : '❌';
          const body = `## ${emoji} Test Coverage: ${coverage}%

          Coverage report for this PR:
          - Minimum recommended: 80%
          - Current coverage: **${coverage}%**

          View detailed HTML report in workflow artifacts.`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install ruff

    - name: Lint with ruff
      run: |
        ruff check . --output-format=github
      continue-on-error: true

    - name: Check formatting with ruff
      run: |
        ruff format --check .
      continue-on-error: true
